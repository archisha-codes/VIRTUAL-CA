version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: virtual-ca-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres_password}
      - POSTGRES_DB=${POSTGRES_DB:-virtual_ca}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - virtual-ca-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-virtual_ca}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: virtual-ca-backend
    ports:
      - "8000:8000"
    environment:
      # Application Settings
      - ENV=${ENV:-production}
      - APP_NAME=GSTR Compliance Backend
      - APP_VERSION=1.1.0
      
      # JWT Authentication
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-secret-key-change-in-production}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRE_MINUTES=1440
      
      # API Key
      - GST_API_KEY=${GST_API_KEY:-gst-secret-key-change-in-production}
      - API_KEY_NAME=X-API-Key
      
      # Rate Limiting
      - RATE_LIMIT_REQUESTS_PER_MINUTE=${RATE_LIMIT_REQUESTS_PER_MINUTE:-60}
      
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=json
      - LOG_DIR=/app/logs
      
      # File Upload Settings
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-10}
      - UPLOAD_DIR=/tmp/uploads
      - TEMP_DIR=/tmp
      
      # Database
      - DATABASE_TYPE=postgresql
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_password}@db:5432/${POSTGRES_DB:-virtual_ca}
      
      # CORS
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - CORS_ALLOW_CREDENTIALS=true
      
      # Frontend URL
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      
      # Session
      - SESSION_SECRET_KEY=${SESSION_SECRET_KEY:-session-secret-change-in-production}
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/uploads:/tmp/uploads
      - ./backend/.env:/app/.env:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - virtual-ca-network

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: virtual-ca-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=${FRONTEND_URL:-http://localhost:8000}
    depends_on:
      - backend
    restart: unless-stopped
    stdin_open: true
    tty: true
    networks:
      - virtual-ca-network

networks:
  virtual-ca-network:
    name: virtual-ca-network
    driver: bridge

volumes:
  postgres_data:
  logs:
  uploads:
